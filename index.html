<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Calorías"/>
<meta name="theme-color" content="#0d0d14"/>
<title>Diario Calórico · Tomás</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#0d0d14;color:#e0e0f0;font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;overscroll-behavior:none}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
input,button,select{font-family:inherit}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:#0d0d14}
::-webkit-scrollbar-thumb{background:#2a2a3a;border-radius:99px}
#app{max-width:540px;margin:0 auto;min-height:100vh}
.header{background:#0d0d14cc;backdrop-filter:blur(12px);border-bottom:1px solid #1e1e2e;padding:18px 20px 14px;position:sticky;top:0;z-index:10}
.header-label{font-size:11px;color:#555570;text-transform:uppercase;letter-spacing:2px;margin-bottom:2px}
.header-title{font-size:20px;font-weight:800;color:#e0e0f0;display:flex;justify-content:space-between;align-items:center}
.content{padding:16px 16px 90px}
.card{background:#16161e;border-radius:18px;padding:20px;margin-bottom:16px;border:1px solid #1e1e2e}
.kcal-big{font-size:44px;font-weight:800;line-height:1;font-variant-numeric:tabular-nums}
.kcal-sub{font-size:12px;color:#555570;margin-top:4px}
.remaining{text-align:right}
.remaining-num{font-size:26px;font-weight:700;font-variant-numeric:tabular-nums}
.progress-bar-bg{background:#1e1e2e;border-radius:99px;height:6px;margin:16px 0}
.progress-bar{border-radius:99px;height:6px;transition:width .6s ease}
.macro-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.macro-card{background:#111118;border-radius:10px;padding:10px 12px}
.macro-label{font-size:10px;color:#555570;text-transform:uppercase;letter-spacing:1px;margin-bottom:3px}
.macro-val{font-size:17px;font-weight:700;font-variant-numeric:tabular-nums}
.macro-val span{font-size:10px;color:#555570;font-weight:400}
.macro-bar-bg{background:#222230;border-radius:99px;height:3px;margin-top:6px}
.macro-bar{border-radius:99px;height:3px;transition:width .5s ease;opacity:.8}
.macro-foot{font-size:9px;color:#333345;margin-top:3px}
.meal-header{display:flex;justify-content:space-between;align-items:center;padding:0 4px;margin-bottom:6px}
.meal-name{font-size:12px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:1px}
.meal-kcal{font-size:12px;color:#444}
.entry-row{background:#16161e;border:1px solid #1e1e2e;border-radius:12px;padding:10px 14px;margin-bottom:6px;display:flex;align-items:center;gap:12px}
.entry-food{font-size:14px;font-weight:500;color:#d0d0e8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.entry-meta{font-size:11px;color:#444;margin-top:2px}
.entry-kcal{font-size:15px;font-weight:700;color:#ccc;min-width:40px;text-align:right;font-variant-numeric:tabular-nums}
.entry-actions{display:flex;gap:6px}
.icon-btn{background:none;border:none;color:#444;cursor:pointer;font-size:15px;padding:2px;line-height:1}
.fab{position:fixed;bottom:80px;right:20px;background:#5b5fef;color:#fff;border:none;border-radius:50%;width:58px;height:58px;font-size:26px;cursor:pointer;box-shadow:0 4px 24px rgba(91,95,239,.5);display:flex;align-items:center;justify-content:center;z-index:20;font-weight:300;transition:transform .15s}
.fab:active{transform:scale(.92)}
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:540px;background:#0d0d14;border-top:1px solid #1e1e2e;display:flex;padding:8px 0 max(16px,env(safe-area-inset-bottom));z-index:15}
.nav-btn{flex:1;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 0}
.nav-icon{font-size:20px}
.nav-label{font-size:11px;font-weight:400;transition:color .2s}
.nav-dot{width:4px;height:4px;border-radius:50%;background:#7c7fff}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:50;display:flex;align-items:flex-end;justify-content:center}
.modal{background:#16161e;border-radius:20px 20px 0 0;padding:24px 20px max(40px,env(safe-area-inset-bottom));width:100%;max-width:540px;border-top:1px solid #2a2a3a;max-height:90vh;overflow-y:auto}
.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.modal-title{font-size:16px;font-weight:700;color:#e0e0f0}
.close-btn{background:none;border:none;color:#555570;font-size:24px;cursor:pointer;line-height:1}
.meal-pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.pill{border:none;border-radius:8px;padding:6px 11px;font-size:12px;cursor:pointer;transition:all .15s;font-family:inherit}
.search-wrap{position:relative;margin-bottom:8px}
.text-input{width:100%;background:#111118;border:1px solid #2a2a3a;border-radius:10px;padding:12px 14px;color:#e0e0f0;font-size:14px;outline:none}
.text-input:focus{border-color:#5b5fef55}
.food-suggestions{background:#111118;border:1px solid #2a2a3a;border-radius:10px;overflow:hidden;margin-bottom:12px}
.suggestion-item{padding:11px 14px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #1a1a28}
.suggestion-item:last-child{border-bottom:none}
.suggestion-item:active{background:#1e1e2e}
.suggestion-name{font-size:13px;color:#d0d0e8;font-weight:500}
.suggestion-meta{font-size:11px;color:#555570;margin-top:2px}
.suggestion-kcal{font-size:14px;font-weight:700;color:#7c7fff;font-variant-numeric:tabular-nums}
.section-label{font-size:10px;color:#555570;text-transform:uppercase;letter-spacing:1.2px;padding:8px 14px 4px;background:#111118}
.num-grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;margin-bottom:20px}
.num-field label{font-size:10px;color:#555570;text-transform:uppercase;letter-spacing:.8px;display:block;margin-bottom:4px}
.num-input{width:100%;background:#111118;border-radius:8px;padding:9px 10px;font-size:15px;font-weight:600;outline:none;font-family:inherit}
.modal-actions{display:flex;gap:10px}
.btn{border:none;border-radius:10px;padding:13px;font-size:14px;cursor:pointer;font-family:inherit;transition:background .2s}
.btn-cancel{flex:1;background:#1e1e2e;color:#888}
.btn-save{flex:2;background:#5b5fef;color:#fff;font-weight:700}
.btn-save:disabled{background:#2a2a3a;color:#444;cursor:not-allowed}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.stat-card{background:#16161e;border-radius:14px;padding:16px 14px;border:1px solid #1e1e2e}
.stat-label{font-size:10px;color:#555570;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.stat-val{font-size:28px;font-weight:800;font-variant-numeric:tabular-nums}
.stat-sub{font-size:11px;color:#444;margin-top:4px}
.chart-bars{display:flex;align-items:flex-end;gap:8px;height:80px}
.chart-bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.chart-bar-bg{width:100%;background:#1e1e2e;border-radius:4px;height:60px;display:flex;align-items:flex-end;overflow:hidden}
.chart-bar{width:100%;border-radius:4px;min-height:2px;transition:height .6s ease;opacity:.85}
.chart-label{font-size:9px;color:#555570}
.chart-val{font-size:9px;color:#444;font-variant-numeric:tabular-nums}
.history-row{background:#16161e;border:1px solid #1e1e2e;border-radius:14px;padding:14px 16px;margin-bottom:10px;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.history-row:active{border-color:#5b5fef44}
.empty{text-align:center;color:#333345;padding:50px 0;font-size:14px}
.empty-icon{font-size:32px;margin-bottom:12px}
.back-btn{background:#1e1e2e;border:none;border-radius:8px;padding:5px 12px;color:#888;font-size:12px;cursor:pointer;font-family:inherit}
.lib-row{background:#16161e;border:1px solid #1e1e2e;border-radius:12px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.lib-info{flex:1;min-width:0}
.lib-name{font-size:14px;font-weight:500;color:#d0d0e8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lib-meta{font-size:11px;color:#555570;margin-top:2px}
.lib-kcal{font-size:16px;font-weight:700;color:#7c7fff;font-variant-numeric:tabular-nums;min-width:40px;text-align:right}
.lib-del{background:none;border:none;color:#333345;cursor:pointer;font-size:14px;padding:4px}
.divider{height:1px;background:#1e1e2e;margin:16px 0}
</style>
</head>
<body>
<div id="app"></div>
<script>
const STORAGE_KEY='ct_entries_v2';
const CONFIG_KEY='ct_config_v2';
const FOODS_KEY='ct_foods_v1';
const DEFAULT_CONFIG={name:'Tomás',dailyGoal:2140,proteinGoal:160,carbsGoal:220,fatGoal:70,startDate:'2026-06-14',startWeight:84,targetWeight:79};
const MEALS=['Desayuno','Almuerzo','Comida','Merienda','Cena','Extra'];
const MEAL_ICONS={Desayuno:'☀️',Almuerzo:'🥐',Comida:'🍽️',Merienda:'🍎',Cena:'🌙',Extra:'➕'};

function getTodayStr(){return new Date().toISOString().split('T')[0]}
function uuid(){return crypto.randomUUID()}
function formatDate(d){const[y,m,day]=d.split('-');const mn=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];return`${parseInt(day)} ${mn[parseInt(m)-1]} ${y}`}
function formatShort(d){const[,m,day]=d.split('-');const mn=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];return`${parseInt(day)} ${mn[parseInt(m)-1]}`}
function getNow(){return new Date().toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'})}
function daysBetween(a,b){return Math.max(0,Math.round((new Date(b)-new Date(a))/86400000))}

function loadEntries(){try{const r=localStorage.getItem(STORAGE_KEY);return r?JSON.parse(r):[]}catch{return[]}}
function saveEntries(e){localStorage.setItem(STORAGE_KEY,JSON.stringify(e))}
function loadConfig(){try{const r=localStorage.getItem(CONFIG_KEY);return r?{...DEFAULT_CONFIG,...JSON.parse(r)}:DEFAULT_CONFIG}catch{return DEFAULT_CONFIG}}
function loadFoods(){try{const r=localStorage.getItem(FOODS_KEY);return r?JSON.parse(r):[]}catch{return[]}}
function saveFoods(f){localStorage.setItem(FOODS_KEY,JSON.stringify(f))}

// Saves/updates a food in library, bumps useCount
function upsertFood(name,kcal,protein,carbs,fat){
  let foods=loadFoods();
  const key=name.toLowerCase().trim();
  const idx=foods.findIndex(f=>f.name.toLowerCase().trim()===key);
  if(idx>=0){
    foods[idx].useCount=(foods[idx].useCount||1)+1;
    foods[idx].kcal=kcal;foods[idx].protein=protein;foods[idx].carbs=carbs;foods[idx].fat=fat;
  } else {
    foods.push({id:uuid(),name:name.trim(),kcal,protein,carbs,fat,useCount:1});
  }
  saveFoods(foods);
}

function totals(entries){return entries.reduce((a,e)=>({kcal:a.kcal+(e.kcal||0),protein:a.protein+(e.protein||0),carbs:a.carbs+(e.carbs||0),fat:a.fat+(e.fat||0)}),{kcal:0,protein:0,carbs:0,fat:0})}
function getAllDates(entries){return[...new Set(entries.map(e=>e.date))].sort((a,b)=>b.localeCompare(a))}
function entriesForDate(entries,date){return entries.filter(e=>e.date===date)}
function barColor(kcal,goal){return kcal>goal?'#ef4444':kcal>goal*.88?'#f59e0b':'#22c55e'}
function estimateLoss(entries,config){
  let deficit=0;
  getAllDates(entries).forEach(d=>{const t=totals(entriesForDate(entries,d));if(t.kcal>0){const def=config.dailyGoal-t.kcal;if(def>0)deficit+=def;}});
  return deficit/7700;
}

// ---- State ----
let state={
  entries:loadEntries(),config:loadConfig(),tab:'day',viewDate:null,
  showModal:false,editId:null,
  form:{meal:'Desayuno',food:'',kcal:'',protein:'',carbs:'',fat:''},
  foodSearch:'',
};
function setState(patch){state={...state,...patch};render()}

// ---- Suggestions logic ----
function getSuggestions(query){
  const foods=loadFoods();
  if(!query.trim()){
    // Show top 6 most used
    return foods.sort((a,b)=>(b.useCount||0)-(a.useCount||0)).slice(0,6);
  }
  const q=query.toLowerCase();
  return foods.filter(f=>f.name.toLowerCase().includes(q)).sort((a,b)=>(b.useCount||0)-(a.useCount||0)).slice(0,6);
}

// ---- Render helpers ----
function macroBar(label,value,goal,color){
  const pct=Math.min(100,(value/goal)*100);
  const el=document.createElement('div');el.className='macro-card';
  el.innerHTML=`<div class="macro-label">${label}</div><div class="macro-val" style="color:${color}">${value.toFixed(0)}<span>g</span></div><div class="macro-bar-bg"><div class="macro-bar" style="background:${color};width:${pct}%"></div></div><div class="macro-foot">/${goal}g</div>`;
  return el;
}

// ---- MODAL ----
function renderModal(){
  const {form,editId}=state;
  const valid=form.food.trim()&&parseFloat(form.kcal)>0;
  const suggestions=getSuggestions(state.foodSearch);

  const overlay=document.createElement('div');overlay.className='modal-overlay';
  overlay.onclick=e=>{if(e.target===overlay)closeModal();};

  const modal=document.createElement('div');modal.className='modal';

  // Header
  const head=document.createElement('div');head.className='modal-head';
  head.innerHTML=`<span class="modal-title">${editId?'Editar entrada':'Añadir alimento'}</span>`;
  const closeBtn=document.createElement('button');closeBtn.className='close-btn';closeBtn.textContent='×';
  closeBtn.onclick=closeModal;
  head.append(closeBtn);

  // Meal pills
  const pills=document.createElement('div');pills.className='meal-pills';
  MEALS.forEach(m=>{
    const p=document.createElement('button');p.className='pill';
    p.textContent=`${MEAL_ICONS[m]} ${m}`;
    p.style.cssText=`background:${form.meal===m?'#5b5fef':'#1e1e2e'};color:${form.meal===m?'#fff':'#888'};font-weight:${form.meal===m?600:400}`;
    p.onclick=()=>setState({form:{...state.form,meal:m}});
    pills.append(p);
  });

  // Food search input
  const foodIn=document.createElement('input');
  foodIn.className='text-input';
  foodIn.placeholder='Buscar o escribir alimento...';
  foodIn.value=form.food;
  foodIn.oninput=e=>{
    state.form.food=e.target.value;
    state.foodSearch=e.target.value;
    // Update suggestions in-place WITHOUT re-rendering (avoids focus loss)
    buildSuggestions(e.target.value);
    // Update save button
    const saveBtn=document.querySelector('.btn-save');
    if(saveBtn){
      const v=state.form.food.trim()&&parseFloat(state.form.kcal)>0;
      saveBtn.disabled=!v;saveBtn.style.background=v?'#5b5fef':'#2a2a3a';saveBtn.style.color=v?'#fff':'#444';
    }
  };

  // Suggestions container — always in DOM, updated in-place
  const suggestionsEl=document.createElement('div');
  suggestionsEl.className='food-suggestions';
  function buildSuggestions(query){
    suggestionsEl.innerHTML='';
    const suggs=getSuggestions(query);
    if(!suggs.length){suggestionsEl.style.display='none';return;}
    suggestionsEl.style.display='block';
    const lbl=document.createElement('div');lbl.className='section-label';
    lbl.textContent=query.trim()?'Coincidencias':'Usados frecuentemente';
    suggestionsEl.append(lbl);
    suggs.forEach(f=>{
      const item=document.createElement('div');item.className='suggestion-item';
      const left=document.createElement('div');
      let meta='';
      if(f.protein>0)meta+=`P:${f.protein}g `;
      if(f.carbs>0)meta+=`C:${f.carbs}g `;
      if(f.fat>0)meta+=`G:${f.fat}g`;
      left.innerHTML=`<div class="suggestion-name">${f.name}</div>${meta?`<div class="suggestion-meta">${meta.trim()}</div>`:''}`;
      const right=document.createElement('div');right.className='suggestion-kcal';right.textContent=`${f.kcal} kcal`;
      item.append(left,right);
      item.onclick=()=>{
        // Fill form in-place, no re-render needed
        state.form={...state.form,food:f.name,kcal:f.kcal+'',protein:f.protein+'',carbs:f.carbs+'',fat:f.fat+''};
        state.foodSearch=f.name;
        foodIn.value=f.name;
        const keys=['kcal','protein','carbs','fat'];
        document.querySelectorAll('.num-input').forEach((inp,i)=>{inp.value=state.form[keys[i]];});
        buildSuggestions(f.name);
        const saveBtn=document.querySelector('.btn-save');
        if(saveBtn){saveBtn.disabled=false;saveBtn.style.background='#5b5fef';saveBtn.style.color='#fff';}
      };
      suggestionsEl.append(item);
    });
  }
  buildSuggestions(state.foodSearch);

  // Divider
  const div=document.createElement('div');div.className='divider';

  // Macro fields
  const numGrid=document.createElement('div');numGrid.className='num-grid';
  [{key:'kcal',label:'Kcal',color:'#e0e0f0'},{key:'protein',label:'Prot',color:'#7c7fff'},{key:'carbs',label:'Carbos',color:'#ff8c42'},{key:'fat',label:'Grasa',color:'#ffd93d'}].forEach(({key,label,color})=>{
    const wrap=document.createElement('div');wrap.className='num-field';
    const lbl=document.createElement('label');lbl.textContent=label;
    const inp=document.createElement('input');inp.type='number';inp.inputMode='decimal';inp.placeholder='0';
    inp.className='num-input';inp.style.cssText=`color:${color};border:1px solid ${color}30`;
    inp.value=form[key];
    inp.oninput=e=>{state.form[key]=e.target.value;};
    wrap.append(lbl,inp);numGrid.append(wrap);
  });

  // Actions
  const acts=document.createElement('div');acts.className='modal-actions';
  const cancelBtn=document.createElement('button');cancelBtn.className='btn btn-cancel';cancelBtn.textContent='Cancelar';cancelBtn.onclick=closeModal;
  const saveBtn=document.createElement('button');saveBtn.className='btn btn-save';
  saveBtn.textContent=editId?'Guardar':'Añadir';
  if(!valid)saveBtn.disabled=true;
  saveBtn.onclick=()=>{
    const f=state.form;
    if(!f.food.trim()||!parseFloat(f.kcal))return;
    const kcal=parseFloat(f.kcal)||0,protein=parseFloat(f.protein)||0,carbs=parseFloat(f.carbs)||0,fat=parseFloat(f.fat)||0;
    // Save to food library
    upsertFood(f.food.trim(),kcal,protein,carbs,fat);
    let ne;
    if(state.editId){
      ne=state.entries.map(e=>e.id===state.editId?{...e,meal:f.meal,food:f.food.trim(),kcal,protein,carbs,fat}:e);
    } else {
      ne=[...state.entries,{id:uuid(),date:state.viewDate||getTodayStr(),meal:f.meal,food:f.food.trim(),kcal,protein,carbs,fat,time:getNow()}];
    }
    saveEntries(ne);
    setState({entries:ne,showModal:false,editId:null,foodSearch:'',form:{meal:'Desayuno',food:'',kcal:'',protein:'',carbs:'',fat:''}});
  };
  acts.append(cancelBtn,saveBtn);

  modal.append(head,pills,foodIn);
  if(suggestionsEl)modal.append(suggestionsEl);
  modal.append(div,numGrid,acts);
  overlay.append(modal);
  return overlay;
}

function closeModal(){setState({showModal:false,editId:null,foodSearch:'',form:{meal:'Desayuno',food:'',kcal:'',protein:'',carbs:'',fat:''}});}

// ---- VIEWS ----
function renderDayView(){
  const date=state.viewDate||getTodayStr();
  const cfg=state.config;
  const dayEntries=entriesForDate(state.entries,date);
  const t=totals(dayEntries);
  const rem=cfg.dailyGoal-t.kcal;
  const pct=Math.min(100,(t.kcal/cfg.dailyGoal)*100);
  const bc=barColor(t.kcal,cfg.dailyGoal);
  const frag=document.createDocumentFragment();

  const card=document.createElement('div');card.className='card';
  const topRow=document.createElement('div');topRow.style.cssText='display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px';
  const left=document.createElement('div');
  left.innerHTML=`<div class="kcal-big" style="color:${bc}">${t.kcal.toFixed(0)}</div><div class="kcal-sub">de ${cfg.dailyGoal} kcal objetivo</div>`;
  const right=document.createElement('div');right.className='remaining';
  right.innerHTML=`<div class="remaining-num" style="color:${rem>=0?'#888':'#ef4444'}">${rem>=0?rem.toFixed(0):'+'+Math.abs(rem).toFixed(0)}</div><div style="font-size:11px;color:#555570">${rem>=0?'restantes':'excedido'}</div>`;
  topRow.append(left,right);
  const pbg=document.createElement('div');pbg.className='progress-bar-bg';
  const pb=document.createElement('div');pb.className='progress-bar';pb.style.cssText=`background:${bc};width:${pct}%`;pbg.append(pb);
  const mg=document.createElement('div');mg.className='macro-grid';
  mg.append(macroBar('Proteína',t.protein,cfg.proteinGoal,'#7c7fff'));
  mg.append(macroBar('Carbos',t.carbs,cfg.carbsGoal,'#ff8c42'));
  mg.append(macroBar('Grasa',t.fat,cfg.fatGoal,'#ffd93d'));
  card.append(topRow,pbg,mg);
  frag.append(card);

  let hasEntries=false;
  MEALS.forEach(meal=>{
    const me=dayEntries.filter(e=>e.meal===meal);
    if(!me.length)return;
    hasEntries=true;
    const mt=totals(me);
    const mh=document.createElement('div');mh.style.marginBottom='14px';
    const hdr=document.createElement('div');hdr.className='meal-header';
    hdr.innerHTML=`<span class="meal-name">${MEAL_ICONS[meal]} ${meal}</span><span class="meal-kcal">${mt.kcal.toFixed(0)} kcal</span>`;
    mh.append(hdr);
    me.forEach(e=>{
      const row=document.createElement('div');row.className='entry-row';
      const info=document.createElement('div');info.style.cssText='flex:1;min-width:0';
      let meta=e.time;
      if(e.protein>0)meta+=` · P:${e.protein}g`;
      if(e.carbs>0)meta+=` C:${e.carbs}g`;
      if(e.fat>0)meta+=` G:${e.fat}g`;
      info.innerHTML=`<div class="entry-food">${e.food}</div><div class="entry-meta">${meta}</div>`;
      const kspan=document.createElement('div');kspan.className='entry-kcal';kspan.textContent=e.kcal;
      const acts=document.createElement('div');acts.className='entry-actions';
      const editBtn=document.createElement('button');editBtn.className='icon-btn';editBtn.textContent='✏️';
      editBtn.onclick=()=>{const ef=state.entries.find(x=>x.id===e.id);setState({showModal:true,editId:e.id,foodSearch:ef.food,form:{meal:ef.meal,food:ef.food,kcal:ef.kcal+'',protein:ef.protein+'',carbs:ef.carbs+'',fat:ef.fat+''}});};
      const delBtn=document.createElement('button');delBtn.className='icon-btn';delBtn.textContent='🗑️';
      delBtn.onclick=()=>{if(confirm('¿Eliminar esta entrada?')){const ne=state.entries.filter(x=>x.id!==e.id);saveEntries(ne);setState({entries:ne});}};
      acts.append(editBtn,delBtn);
      row.append(info,kspan,acts);
      mh.append(row);
    });
    frag.append(mh);
  });
  if(!hasEntries){
    const empty=document.createElement('div');empty.className='empty';
    empty.innerHTML='<div class="empty-icon">🍽️</div>Sin entradas hoy.<br>Pulsa + para añadir.';
    frag.append(empty);
  }
  return frag;
}

function renderProgressView(){
  const cfg=state.config;
  const allDates=getAllDates(state.entries);
  const today=getTodayStr();
  const daysSinceStart=daysBetween(cfg.startDate,today);
  const daysWithData=allDates.length;
  const daysMet=allDates.filter(d=>{const t=totals(entriesForDate(state.entries,d));return t.kcal>0&&t.kcal<=cfg.dailyGoal;}).length;
  const loss=estimateLoss(state.entries,cfg);
  const estWeight=cfg.startWeight-loss;
  const progressToGoal=Math.min(100,(loss/(cfg.startWeight-cfg.targetWeight))*100);
  const avgDeficit=daysWithData>0?Math.round((loss*7700)/daysWithData):0;
  const daysLeft=loss<(cfg.startWeight-cfg.targetWeight)?Math.ceil(((cfg.startWeight-cfg.targetWeight)-loss)*7700/500):0;
  const frag=document.createDocumentFragment();

  const wc=document.createElement('div');wc.className='card';
  wc.innerHTML=`<div style="font-size:11px;color:#555570;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px">Peso estimado actual</div>
    <div style="display:flex;align-items:flex-end;gap:12px;margin-bottom:16px">
      <div><span style="font-size:44px;font-weight:800;color:#7c7fff;line-height:1;font-variant-numeric:tabular-nums">${estWeight.toFixed(1)}</span><span style="font-size:16px;color:#555570;margin-left:4px">kg</span></div>
      <div style="margin-bottom:6px"><div style="font-size:13px;color:#22c55e;font-weight:600">−${loss.toFixed(2)} kg perdidos</div><div style="font-size:11px;color:#444">desde ${formatDate(cfg.startDate)}</div></div>
    </div>
    <div style="display:flex;justify-content:space-between;font-size:11px;color:#555570;margin-bottom:6px"><span>${cfg.startWeight} kg</span><span>Objetivo: ${cfg.targetWeight} kg</span></div>
    <div style="background:#1e1e2e;border-radius:99px;height:8px;margin-bottom:8px"><div style="background:linear-gradient(90deg,#7c7fff,#22c55e);border-radius:99px;height:8px;width:${progressToGoal}%;transition:width .8s ease"></div></div>
    <div style="font-size:12px;color:#888;text-align:right">${progressToGoal.toFixed(1)}% del objetivo</div>`;
  frag.append(wc);

  const sg=document.createElement('div');sg.className='stat-grid';
  [{label:'Días registrados',val:daysWithData,sub:`de ${daysSinceStart} desde el inicio`,color:'#7c7fff'},
   {label:'Días en déficit',val:daysMet,sub:`${daysWithData>0?Math.round((daysMet/daysWithData)*100):0}% cumplimiento`,color:'#22c55e'},
   {label:'Déficit medio/día',val:avgDeficit,sub:'kcal de déficit',color:'#ff8c42'},
   {label:'Días para objetivo',val:daysLeft,sub:'a 500 kcal/día',color:'#ffd93d'},
  ].forEach(({label,val,sub,color})=>{
    const sc=document.createElement('div');sc.className='stat-card';
    sc.innerHTML=`<div class="stat-label">${label}</div><div class="stat-val" style="color:${color}">${val}</div><div class="stat-sub">${sub}</div>`;
    sg.append(sc);
  });
  frag.append(sg);

  const last7=allDates.slice(0,7).reverse();
  if(last7.length>0){
    const cc=document.createElement('div');cc.className='card';
    cc.innerHTML=`<div style="font-size:12px;color:#555570;text-transform:uppercase;letter-spacing:1px;margin-bottom:16px">Últimos días</div>`;
    const bars=document.createElement('div');bars.className='chart-bars';
    last7.forEach(date=>{
      const t=totals(entriesForDate(state.entries,date));
      const pct=Math.min(120,(t.kcal/cfg.dailyGoal)*100);
      const bc=barColor(t.kcal,cfg.dailyGoal);
      const wrap=document.createElement('div');wrap.className='chart-bar-wrap';
      wrap.innerHTML=`<div class="chart-val">${t.kcal.toFixed(0)}</div><div class="chart-bar-bg"><div class="chart-bar" style="background:${bc};height:${pct}%"></div></div><div class="chart-label">${formatShort(date)}</div>`;
      bars.append(wrap);
    });
    cc.append(bars);
    const legend=document.createElement('div');legend.style.cssText='display:flex;align-items:center;gap:6px;margin-top:10px';
    legend.innerHTML=`<div style="width:12px;height:2px;background:#5b5fef;border-radius:1px"></div><span style="font-size:10px;color:#444">Objetivo: ${cfg.dailyGoal} kcal</span>`;
    cc.append(legend);
    frag.append(cc);
  }
  return frag;
}

function renderHistoryView(){
  const allDates=getAllDates(state.entries);
  const frag=document.createDocumentFragment();
  const cfg=state.config;
  const today=getTodayStr();
  if(!allDates.length){
    const empty=document.createElement('div');empty.className='empty';
    empty.innerHTML='<div class="empty-icon">📅</div>Sin días registrados todavía.';
    frag.append(empty);return frag;
  }
  allDates.forEach(date=>{
    const t=totals(entriesForDate(state.entries,date));
    const pct=Math.min(100,(t.kcal/cfg.dailyGoal)*100);
    const bc=barColor(t.kcal,cfg.dailyGoal);
    const isToday=date===today;
    const row=document.createElement('div');row.className='history-row';
    if(isToday)row.style.borderColor='#5b5fef44';
    row.innerHTML=`<div><div style="font-size:14px;font-weight:600;color:${isToday?'#7c7fff':'#d0d0e8'}">${isToday?'Hoy · ':''}${formatDate(date)}</div><div style="font-size:11px;color:#444;margin-top:2px">${entriesForDate(state.entries,date).length} entradas</div><div style="background:#1e1e2e;border-radius:99px;height:3px;width:80px;margin-top:8px"><div style="background:${bc};border-radius:99px;height:3px;width:${pct}%"></div></div></div><div style="text-align:right"><div style="font-size:22px;font-weight:800;color:${bc};font-variant-numeric:tabular-nums">${t.kcal.toFixed(0)}</div><div style="font-size:10px;color:#444">kcal</div><div style="font-size:11px;color:${t.kcal<=cfg.dailyGoal?'#22c55e':'#ef4444'};margin-top:2px">${t.kcal<=cfg.dailyGoal?'✓ En déficit':'✗ Excedido'}</div></div>`;
    row.onclick=()=>setState({tab:'day',viewDate:date});
    frag.append(row);
  });
  return frag;
}

function renderLibraryView(){
  const foods=loadFoods().sort((a,b)=>(b.useCount||0)-(a.useCount||0));
  const frag=document.createDocumentFragment();
  const info=document.createElement('div');
  info.style.cssText='font-size:12px;color:#555570;margin-bottom:16px;padding:0 2px';
  info.textContent=`${foods.length} alimentos guardados. Se añaden automáticamente al registrar.`;
  frag.append(info);
  if(!foods.length){
    const empty=document.createElement('div');empty.className='empty';
    empty.innerHTML='<div class="empty-icon">📚</div>Aún no hay alimentos guardados.<br>Se guardan al añadirlos al diario.';
    frag.append(empty);return frag;
  }
  foods.forEach(f=>{
    const row=document.createElement('div');row.className='lib-row';
    let meta='';
    if(f.protein>0)meta+=`P:${f.protein}g `;
    if(f.carbs>0)meta+=`C:${f.carbs}g `;
    if(f.fat>0)meta+=`G:${f.fat}g`;
    const info=document.createElement('div');info.className='lib-info';
    info.innerHTML=`<div class="lib-name">${f.name}</div><div class="lib-meta">${meta.trim()||'Sin macros'} · usado ${f.useCount||1}x</div>`;
    const kcalEl=document.createElement('div');kcalEl.className='lib-kcal';kcalEl.textContent=`${f.kcal} kcal`;
    const delBtn=document.createElement('button');delBtn.className='lib-del';delBtn.textContent='🗑️';delBtn.title='Eliminar de biblioteca';
    delBtn.onclick=()=>{
      if(confirm(`¿Eliminar "${f.name}" de la biblioteca?`)){
        const updated=loadFoods().filter(x=>x.id!==f.id);
        saveFoods(updated);setState({});
      }
    };
    row.append(info,kcalEl,delBtn);
    frag.append(row);
  });
  return frag;
}

// ---- MAIN RENDER ----
function render(){
  const app=document.getElementById('app');app.innerHTML='';
  const hdr=document.createElement('div');hdr.className='header';
  const lbl=document.createElement('div');lbl.className='header-label';lbl.textContent='Diario calórico · Tomás';
  const titleRow=document.createElement('div');titleRow.className='header-title';
  const titles={day:'Hoy',progress:'Progreso',history:'Historial',library:'Biblioteca'};
  let title=titles[state.tab];
  if(state.tab==='day'&&state.viewDate&&state.viewDate!==getTodayStr())title=formatDate(state.viewDate);
  const titleEl=document.createElement('span');titleEl.textContent=title;
  titleRow.append(titleEl);
  if(state.viewDate&&state.viewDate!==getTodayStr()&&state.tab==='day'){
    const backBtn=document.createElement('button');backBtn.className='back-btn';backBtn.textContent='← Hoy';
    backBtn.onclick=()=>setState({viewDate:null});
    titleRow.append(backBtn);
  }
  hdr.append(lbl,titleRow);app.append(hdr);

  const content=document.createElement('div');content.className='content';
  if(state.tab==='day')content.append(renderDayView());
  else if(state.tab==='progress')content.append(renderProgressView());
  else if(state.tab==='history')content.append(renderHistoryView());
  else if(state.tab==='library')content.append(renderLibraryView());
  app.append(content);

  if(state.tab==='day'){
    const fab=document.createElement('button');fab.className='fab';fab.textContent='+';
    fab.onclick=()=>setState({showModal:true,editId:null,foodSearch:'',form:{meal:'Desayuno',food:'',kcal:'',protein:'',carbs:'',fat:''}});
    app.append(fab);
  }

  const nav=document.createElement('div');nav.className='bottom-nav';
  [{key:'day',icon:'☀️',label:'Hoy'},{key:'progress',icon:'📊',label:'Progreso'},{key:'history',icon:'📅',label:'Historial'},{key:'library',icon:'📚',label:'Biblioteca'}].forEach(({key,icon,label})=>{
    const btn=document.createElement('button');btn.className='nav-btn';
    const active=state.tab===key;
    btn.innerHTML=`<span class="nav-icon">${icon}</span><span class="nav-label" style="color:${active?'#7c7fff':'#444'};font-weight:${active?700:400}">${label}</span>${active?'<div class="nav-dot"></div>':''}`;
    btn.onclick=()=>setState({tab:key});
    nav.append(btn);
  });
  app.append(nav);

  if(state.showModal)app.append(renderModal());
}

render();
</script>
</body>
</html>
